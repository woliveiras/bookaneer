# https://mise.jdx.dev/
# Run `mise install` to install all tools

[tools]
go = "1.26"
node = "24"
pnpm = "10.33"

[env]
BOOKANEER_DATA_DIR = "./data"

[tasks.dev]
description = "Start backend + frontend in dev mode"
run = "make dev"

[tasks.test]
description = "Run all tests"
run = "make test"

[tasks.lint]
description = "Run linters"
run = "make lint"
